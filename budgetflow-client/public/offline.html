<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#007F68" />
    <title>You are offline | BudgetFlow</title>
    <style>
      :root {
        color: #17211d;
        background: #f8faf9;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        align-items: center;
        display: flex;
        justify-content: center;
        margin: 0;
        min-height: 100vh;
        padding: 24px;
      }

      main {
        background: #ffffff;
        border: 1px solid #dfe8e3;
        border-radius: 12px;
        box-shadow: 0 18px 45px rgba(18, 38, 31, 0.08);
        max-width: 420px;
        padding: 28px;
        text-align: center;
        width: 100%;
      }

      img {
        border: 1px solid #dfe8e3;
        border-radius: 14px;
        height: 56px;
        object-fit: cover;
        width: 56px;
      }

      h1 {
        font-size: 24px;
        line-height: 1.2;
        margin: 20px 0 0;
      }

      p {
        color: #5d6f66;
        font-size: 14px;
        line-height: 1.65;
        margin: 12px 0 0;
      }

      button {
        align-items: center;
        background: #007f68;
        border: 0;
        border-radius: 8px;
        color: #ffffff;
        cursor: pointer;
        display: inline-flex;
        font: inherit;
        font-size: 14px;
        font-weight: 700;
        justify-content: center;
        margin-top: 22px;
        min-height: 42px;
        padding: 0 18px;
      }

      button:focus-visible {
        outline: 3px solid rgba(0, 127, 104, 0.28);
        outline-offset: 3px;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          background: #0b1512;
          color: #eef8f3;
        }

        main {
          background: #111f1a;
          border-color: #2c4038;
          box-shadow: 0 18px 45px rgba(0, 0, 0, 0.28);
        }

        img {
          background: #111f1a;
          border-color: #2c4038;
        }

        p {
          color: #9fb4aa;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <img alt="BudgetFlow" src="/icon.png" />
      <h1>You are offline</h1>
      <p>BudgetFlow cannot load this page right now. Check your connection and try again.</p>
      <button onclick="window.location.reload()" type="button">Try again</button>
    </main>
  </body>
</html>
