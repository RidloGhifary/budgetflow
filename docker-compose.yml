services:
  postgres:
    container_name: budgetflow_db
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-budgetflow}
      POSTGRES_USER: ${POSTGRES_USER:-budgetflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-budgetflow_password}
    ports:
      - "5432:5432"
    volumes:
      - budgetflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  server:
    container_name: budgetflow_server
    build:
      context: ./budgetflow-server
      target: development
    restart: unless-stopped
    command: sh -c "pnpm prisma:generate && pnpm migration:run && pnpm migration:deploy && pnpm dev"
    environment:
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL:-postgresql://budgetflow:budgetflow_password@postgres:5432/budgetflow?schema=public}
      JWT_SECRET: ${JWT_SECRET:-replace-with-a-long-random-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${SERVER_PORT:-4000}:4000"
    volumes:
      - ./budgetflow-server:/app
      - server_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://localhost:4000/health'').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  client:
    container_name: budgetflow_client
    build:
      context: ./budgetflow-client
      target: development
    restart: unless-stopped
    command: pnpm run dev --hostname 0.0.0.0
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
    ports:
      - "${CLIENT_PORT:-3000}:3000"
    volumes:
      - ./budgetflow-client:/app
      - client_node_modules:/app/node_modules
      - client_next_cache:/app/.next
    depends_on:
      server:
        condition: service_healthy

volumes:
  budgetflow_postgres_data:
    name: budgetflow_postgres_data
  server_node_modules:
  client_node_modules:
  client_next_cache:
